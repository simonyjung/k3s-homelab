---
name: CI
'on':
  push:
    paths-ignore:
      - '*.md'
    branches:
      - main
  pull_request:
    paths-ignore:
      - '*.md'
  schedule:
    - cron: "0 5 * * 2"

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v7

      - name: Set up Python 3.
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install test dependencies.
        run: pip3 install yamllint

      - name: Lint code.
        run: |
          yamllint .

  validate:
    name: Validate rendering
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v7

      - name: Build Kustomize overlays.
        run: |
          for dir in apps/*/envs/*/; do
            echo "::group::${dir}"
            kustomize build "${dir}" > /dev/null
            echo "::endgroup::"
          done

      - name: Render Helm charts.
        run: |
          for chart in apps-helm/* infrastructure-helm/*; do
            echo "::group::${chart}"
            helm dependency build "${chart}"
            if [ -d "${chart}/envs" ]; then
              for values in "${chart}"/envs/*/values.yaml; do
                helm template "${chart}" -f "${values}" > /dev/null
              done
            else
              helm template "${chart}" -f "${chart}/values.yaml" > /dev/null
            fi
            echo "::endgroup::"
          done
