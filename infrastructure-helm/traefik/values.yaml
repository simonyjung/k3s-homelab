---
traefik:
  # Two replicas so losing any single node (reboot, upgrade) never leaves
  # the ingress VIP with no backend - a 1-replica traefik made its node a
  # de-facto SPOF despite MetalLB failover.
  deployment:
    replicas: 2
  # Replicas on the same node would defeat the point - force them onto
  # different nodes, and never let a voluntary drain evict both at once
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: traefik
  podDisruptionBudget:
    enabled: true
    minAvailable: 1
  # Requests move the pods out of BestEffort QoS (first evicted under
  # node memory pressure); ingress should be among the last to go
  priorityClassName: system-cluster-critical
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
  # Pin the LAN entrypoint VIP; *.cluster.simonjung.io points here.
  # See docs/load-balancing.md.
  service:
    annotations:
      metallb.io/loadBalancerIPs: 10.0.10.200
  ports:
    web:
      http:
        redirections:
          entryPoint:
            to: websecure
            scheme: https
    websecure:
      http:
        tls:
          enabled: true
  ingressRoute:
    dashboard:
      enabled: true
      entryPoints: [web, websecure]
      matchRule: Host(`traefik.cluster.simonjung.io`)
      middlewares:
        - name: dashboard-auth
      tls:
        secretName: traefik-ingress-secret
certificate:
  secretName: traefik-ingress-secret
  issuerRef:
    name: cloudflare-clusterissuer
    kind: ClusterIssuer
# htpasswd credentials for the basic-auth middleware guarding the dashboard
dashboardAuth:
  secretName: dashboard-basic-auth
  itemPath: vaults/Kubernetes/items/dashboard-basic-auth
