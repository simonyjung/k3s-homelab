---
cert-manager:
  namespace: "cert-manager"
  crds:
    enabled: true
  extraArgs:
    - --dns01-recursive-nameservers-only
    - --dns01-recursive-nameservers=1.1.1.1:53,1.0.0.1:53
  # Expose controller metrics to the monitoring stack (certificate
  # expiry timestamps, ready status, ACME renewals)
  prometheus:
    enabled: true
    servicemonitor:
      enabled: true
  # The webhook is failurePolicy=Fail on all cert-manager CRDs - while
  # it is down, every production ArgoCD sync fails (each overlay applies
  # a Certificate). Two replicas on different nodes, drain-safe.
  webhook:
    replicaCount: 2
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: webhook
            app.kubernetes.io/instance: cert-manager

clusterIssuer:
  name: "cloudflare-clusterissuer"
  acme:
    email: "admin@simonjung.io"
    server: "https://acme-v02.api.letsencrypt.org/directory"
    privateKeySecretRefName: "cloudflare-clusterissuer-account-key"

cloudflare:
  secretName: cloudflare-api-token-secret
  key: api-token
  itemPath: "vaults/Kubernetes/items/cloudflare-api-token"
