---
longhorn:
  # Needed when installind with argoCD
  preUpgradeChecker:
    jobEnabled: false
  longhornUI:
    replicas: 1
  defaultSettings:
    backupTarget: "nfs://192.168.40.118:/volume1/longhorn"
    # When a node dies (not drained), its pods stay Terminating forever
    # because the kubelet can't confirm shutdown - force-delete them so
    # RWO volumes reattach and workloads reschedule
    nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
certificate:
  name: longhorn-ingress-certificate
  secretName: longhorn-ingress-secret
  issuerRef:
    name: cloudflare-clusterissuer
    kind: ClusterIssuer
  dnsNames:
    - longhorn.cluster.simonjung.io
ingress:
  host: longhorn.cluster.simonjung.io
# Recurring jobs (default group = all volumes). Backups go to the NFS
# backup target above; retain bounds growth - the job deletes its own
# backups beyond the newest N per volume. Manual backups are never
# auto-pruned. snapshot-cleanup purges system/error snapshots on-node.
# snapshot-delete is the only task that prunes user-created snapshots
# (manual, preupgrade, system-backup leftovers) - without it they pin
# deleted blocks forever and actualSize grows past the volume size.
# retain 3 = latest daily-backup snap + latest weekly-backup snap
# (auto-cleanup keeps one per backup job) + one slot so a manual
# snapshot survives ~a day before being pruned.
recurringJobs:
  - name: backup-daily
    task: backup
    cron: "0 2 * * *"
    retain: 7
    concurrency: 2
  - name: backup-weekly
    task: backup
    cron: "0 3 * * 0"
    retain: 4
    concurrency: 2
  - name: snapshot-cleanup
    task: snapshot-cleanup
    cron: "0 4 * * *"
    retain: 0
    concurrency: 2
  - name: filesystem-trim
    task: filesystem-trim
    cron: "0 0 * * *"
    retain: 0
    concurrency: 1
  - name: snapshot-delete
    task: snapshot-delete
    cron: "30 4 * * *"
    retain: 3
    concurrency: 2
# htpasswd credentials for the basic-auth middleware guarding the UI
dashboardAuth:
  secretName: dashboard-basic-auth
  itemPath: vaults/Kubernetes/items/dashboard-basic-auth
