---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alertmanager-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: monitoring-alertmanager-auth@kubernetescrd
spec:
  rules:
    - host: {{.Values.ingressAlertmanager.host}}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus-alertmanager
                port:
                  number: 9093
  tls:
    - hosts:
        - {{.Values.ingressAlertmanager.host}}
      secretName: {{.Values.certificateAlertmanager.secretName}}
