---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
    name: {{.Values.certificateAlertmanager.name}}
spec:
    secretName: {{.Values.certificateAlertmanager.secretName}}
    issuerRef:
        name: {{.Values.certificateAlertmanager.issuerRef.name}}
        kind: {{.Values.certificateAlertmanager.issuerRef.kind}}
    dnsNames: {{.Values.certificateAlertmanager.dnsNames}}
