---
argo-cd:
  global:
    domain: argocd.cluster.simonjung.io
    # Reviewed 2026-07-12 (plan 12.4 step 4): four ingress policies —
    # redis and repo-server locked to the argocd components that use
    # them, controller metrics-only, server allow-all (UI behind
    # traefik). k3s enforces NetworkPolicy natively.
    networkPolicy:
      create: true
  configs:
    params:
      # Serve plain HTTP behind Traefik's TLS termination (standard
      # pattern for TLS-terminating ingress)
      server.insecure: true
  # No SSO is configured (local admin login only), so the Dex OIDC broker
  # serves nothing — re-enable if/when SSO (e.g. GitHub OAuth) is wired up
  dex:
    enabled: false
  # Zero notification triggers/services configured; app-health alerting
  # runs through Prometheus/Alertmanager instead
  notifications:
    enabled: false
  server:
    certificate:
      enabled: true
      issuer:
        kind: ClusterIssuer
        name: cloudflare-clusterissuer
    ingress:
      enabled: true
      ingressClassName: traefik
      tls: true
