---
apiVersion: tailscale.com/v1alpha1
kind: Connector
metadata:
  name: {{.Values.connector.hostname}}
spec:
  hostnamePrefix: {{.Values.connector.hostname}}
  replicas: {{.Values.connector.replicas}}
  proxyClass: {{.Values.connector.proxyClass}}
  subnetRouter:
    advertiseRoutes: {{.Values.connector.routes | toYaml | nindent 6}}
