---
apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  name: homepage-ramp
spec:
  parallelism: 1
  script:
    configMap:
      name: homepage-ramp-script
      file: script.js
  # testid is what the Grafana k6 dashboard's test picker filters on
  # (A/B vs run 2026-07-04-homepage-ramp-1: now 2 replicas x 500m cpu)
  arguments: -o experimental-prometheus-rw --tag testid=homepage-ramp-2replicas
  runner:
    # Generate load from the GPU node - keeps the generator off the
    # etcd servers and (usually) off the node running the target
    nodeSelector:
      gpu: amd
    env:
      - name: K6_PROMETHEUS_RW_SERVER_URL
        value: http://prometheus-prometheus.monitoring.svc:9090/api/v1/write
      - name: K6_PROMETHEUS_RW_TREND_STATS
        value: "p(95),p(99),min,max,avg,med"
    resources:
      requests:
        cpu: 500m
        memory: 256Mi
      limits:
        cpu: "2"
        memory: 512Mi
