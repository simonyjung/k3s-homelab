---
# Benchmark run log - append one record per run, newest last.
#
# Prometheus retention is 10 days: this file is the durable record, so
# log a run promptly after it finishes. Query with yq, e.g.
#   yq '.[] | select(.target.app == "homepage")' benchmarks/results.yaml
#
# Schema (keep keys stable so runs stay comparable):
#   run          unique id: <date>-<testid>-<n>
#   testid       the k6 --tag testid value (dashboard test picker)
#   scenario     directory under benchmarks/
#   window_utc   [start, end] of the metric window (from k6_vus timestamps)
#   status       completed | cancelled | failed
#   target       what was under test WHEN the run happened - image,
#                replicas and limits are the knobs A/B runs compare, so
#                snapshot them here; the repo may change later
#   profile      executor + rate shape (requested load)
#   results      numbers pulled from Prometheus before retention expiry;
#                durations in SECONDS (k6 remote write converts to s)
#   bottleneck   one line: what actually limited throughput
#   followup     plan item / next run that acts on this
#
- run: 2026-07-04-homepage-ramp-1
  testid: homepage-ramp
  scenario: homepage-ramp
  window_utc: ["2026-07-04T04:08:57Z", "2026-07-04T04:16:38Z"]
  status: completed
  target:
    app: homepage
    namespace: homepage-production
    endpoint: http://homepage.homepage-production.svc:3000/
    image: ghcr.io/gethomepage/homepage:v1.13.2
    replicas: 1
    cpu_request: 25m
    cpu_limit: 100m
    memory_request: 512Mi
    memory_limit: 768Mi
  profile: ramping-arrival-rate 5->100 rps over 8m, preAllocatedVUs 100, maxVUs 200
  results:
    requests_total: 10022
    failures_total: 1820
    error_rate: 0.182
    peak_rps_requested: 100
    peak_rps_sustained_1m: 30.1
    peak_rps_instant: 39.2
    p95_s_low_load: 0.211
    p95_s_overload_max: 37.8
    vus_peak: 200  # pinned at maxVUs cap from ~45s in
  bottleneck: >-
    homepage cpu_limit 100m (0.1 core) hard-throttles SSR - the run
    measured the limit, not the app. VUs pinned at cap within ~45s;
    errors only began after the pin (overload queueing, not app bugs).
    Achieved ceiling ~30-40 rps vs 100 requested. Pod healthy after,
    no restarts, no OOM.
  followup: >-
    8.2(c) raises/drops the cpu limit alongside replicas 2 - re-run as
    testid=homepage-ramp-2replicas and compare this record.

- run: 2026-07-04-homepage-ramp-2replicas-1
  testid: homepage-ramp-2replicas
  scenario: homepage-ramp
  window_utc: ["2026-07-04T04:43:59Z", "2026-07-04T04:51:51Z"]
  status: completed
  target:
    app: homepage
    namespace: homepage-production
    endpoint: http://homepage.homepage-production.svc:3000/
    image: ghcr.io/gethomepage/homepage:v1.13.2
    replicas: 2  # + hostname TSC (PR #107)
    cpu_request: 25m
    cpu_limit: 500m  # was 100m in run 1
    memory_request: 256Mi
    memory_limit: 768Mi
  profile: ramping-arrival-rate 5->100 rps over 8m, preAllocatedVUs 100, maxVUs 200
  results:
    requests_total: 25050
    failures_total: 0
    error_rate: 0.0
    peak_rps_requested: 100
    peak_rps_sustained_1m: 99.9
    peak_rps_instant: 100
    p95_s_low_load: 0.0064
    p95_s_overload_max: 0.0226  # never overloaded - this is p95 AT 100 rps
    vus_peak: 14
  bottleneck: >-
    None found - the A/B against run 1 confirms the 100m cpu limit was
    the entire story: same profile went from ~30 rps / 18% errors /
    p95 37.8s to the full 100 rps / 0 errors / p95 22.6ms, using 14 of
    200 VUs. 2.5x more total requests completed because the arrival
    rate was never throttled. Knee is somewhere above 100 rps.
  followup: >-
    Closes the 8.2(c)/9.1 A/B loop. Optional: a knee-finder run
    (ramp to 300+ rps, maxVUs 400) if the actual ceiling matters.

- run: 2026-07-04-homepage-knee-1
  testid: homepage-knee
  scenario: homepage-knee
  window_utc: ["2026-07-04T05:06:57Z", "2026-07-04T05:13:08Z"]
  status: completed
  target:
    app: homepage
    namespace: homepage-production
    endpoint: http://homepage.homepage-production.svc:3000/
    image: ghcr.io/gethomepage/homepage:v1.13.2
    replicas: 2
    cpu_request: 25m
    cpu_limit: 500m
    memory_request: 256Mi
    memory_limit: 768Mi
  profile: ramping-arrival-rate 25->300 rps over 7m, preAllocatedVUs 200, maxVUs 400
  results:
    requests_total: 68249
    failures_total: 0
    error_rate: 0.0
    peak_rps_requested: 300
    peak_rps_sustained_1m: 299.5
    p95_s_low_load: 0.0085
    p95_s_overload_max: 0.160
    vus_peak: 71
  bottleneck: >-
    Knee forming but not the ceiling: full 300 rps delivered with zero
    errors, but p95 rose 19x (8.5ms -> 160ms) and both pods spent >90%
    of CFS periods throttled near their 500m limits. Latency departure
    starts in the 150-300 rps ramp.
  followup: iterate at 600 rps to find the hard ceiling (next record)

- run: 2026-07-04-homepage-knee-600-1
  testid: homepage-knee-600
  scenario: homepage-knee
  window_utc: ["2026-07-04T05:15:58Z", "2026-07-04T05:22:00Z"]
  status: completed
  target:
    app: homepage
    namespace: homepage-production
    endpoint: http://homepage.homepage-production.svc:3000/
    image: ghcr.io/gethomepage/homepage:v1.13.2
    replicas: 2
    cpu_request: 25m
    cpu_limit: 500m
    memory_request: 256Mi
    memory_limit: 768Mi
  profile: ramping-arrival-rate 50->600 rps over 7m, preAllocatedVUs 300, maxVUs 600
  results:
    requests_total: 131738
    failures_total: 254
    error_rate: 0.0019
    peak_rps_requested: 600
    peak_rps_sustained_1m: 538.3
    p95_s_low_load: 0.0077
    p95_s_overload_max: 1.05
    vus_peak: 600  # pinned at maxVUs
    dropped_iterations: 4761
  bottleneck: >-
    KNEE FOUND - hard CPU ceiling. Throughput plateaus at ~530-540 rps:
    both pods pinned at exactly 0.500 cores (the limit), VU pool
    exhausted, 4761 iterations dropped, p95 1.05s at the top yet only
    0.2% failures - it degrades slow rather than erroring. Full curve
    for 2x500m: comfortable to ~150 rps (p95 <20ms), knee 150-300
    (p95 160ms @ 300), ceiling ~530 rps. Raising the ceiling means
    raising cpu_limit or replicas; current capacity is ~2 orders of
    magnitude above real usage - no action needed.
  followup: none - curve fully characterized for the 2x500m config

- run: 2026-07-04-django-starter-dev-baseline-1
  testid: django-starter-dev-baseline
  scenario: django-starter-dev-baseline
  window_utc: ["2026-07-04T05:23:57Z", "2026-07-04T05:30:59Z"]
  status: completed
  target:
    app: django-starter
    namespace: django-starter-development
    endpoint: http://django-starter.django-starter-development.svc:8000/ (Host header django-starter-dev.cluster.simonjung.io - ALLOWED_HOSTS 400s without it)
    image: simonjungdocker/django-starter:0.0.4
    replicas: 1
    cpu_request: 25m
    cpu_limit: 100m
    memory_request: 512Mi
    memory_limit: 768Mi
  profile: ramping-arrival-rate 5->100 rps over 8m, preAllocatedVUs 100, maxVUs 200
  results:
    requests_total: 25049
    failures_total: 0
    error_rate: 0.0
    peak_rps_requested: 100
    peak_rps_sustained_1m: 100
    p95_s_low_load: 0.0012
    p95_s_overload_max: 0.0017  # never stressed
    vus_peak: 1
  bottleneck: >-
    None within the profile - the app's / is a ~320-byte page served in
    ~600us; the full 100 rps used a single VU and (verified separately
    with a sustained burst + kubectl top) roughly 77m CPU, so even the
    100m limit has headroom at this load. Baseline is excellent;
    revisit after the app grows real views/db queries. Note two
    observability traps hit: gunicorn does not access-log successes
    (empty pod logs != no traffic), and the ad-hoc PromQL container-CPU
    spot check returned garbage for this pod - kubectl top during a
    burst was the reliable cross-check.
  followup: >-
    Re-baseline when django-starter gains real functionality; a
    knee-finder would currently measure gunicorn, not the app.

- run: 2026-07-04-linkding-knee-1
  testid: linkding-knee
  scenario: linkding-knee
  window_utc: ["2026-07-04T05:37:57Z", "2026-07-04T05:44:56Z"]
  status: completed
  target:
    app: linkding
    namespace: linkding-development  # identical image+limits to prod (dev only patches PVC/Service); knee transfers without saturating the real bookmarks
    endpoint: http://linkding.linkding-development.svc:3000/login
    image: sissbruecker/linkding:1.45.0
    replicas: 1
    cpu_request: 125m
    cpu_limit: 250m
    memory_request: 768Mi
    memory_limit: 1Gi
  profile: ramping-arrival-rate 5->200 rps over 7m, preAllocatedVUs 150, maxVUs 300
  results:
    requests_total: 43561
    failures_total: 810
    error_rate: 0.019
    peak_rps_requested: 200
    peak_rps_sustained_1m: 159.7
    p95_s_low_load: 0.0022
    p95_s_overload_max: 6.8
    vus_peak: 300  # pinned at maxVUs
    dropped_iterations: 22353
  bottleneck: >-
    KNEE FOUND first run - CPU-bound at the 250m limit (pod peaked at
    0.227 cores, ~91% of limit). Login-page renders: p95 2.2ms at low
    load, plateau ~160 rps with the VU pool exhausted, 22k dropped
    iterations, p95 up to 6.8s, 1.9% errors at the top. Pod healthy
    after, no restarts - the new 8.1 livenessProbe did not trip under
    overload. For a single-user bookmark app, ~160 rps of full Django
    page renders is enormous headroom; no action needed. If it ever
    mattered: raise cpu_limit (sqlite forbids replicas>1).
  followup: none - single-replica sqlite app, capacity fine as-is

- run: 2026-07-04-linkding-knee-amley01-1
  testid: linkding-knee-amley01
  scenario: linkding-knee
  window_utc: ["2026-07-04T18:24:55Z", "2026-07-04T18:27:30Z"]
  status: cancelled  # knee unambiguous ~2.5 min in; no value in finishing
  target:
    app: linkding
    namespace: linkding-development
    endpoint: http://linkding.linkding-development.svc:3000/login
    image: sissbruecker/linkding:1.45.0
    replicas: 1
    cpu_request: 125m
    cpu_limit: 250m
    memory_request: 768Mi
    memory_limit: 1Gi
    node: amley01 (N97 MiniPC, pinned via PR #114 for this run; pin reverted after)
  profile: ramping-arrival-rate 5->200 rps over 7m, preAllocatedVUs 150, maxVUs 300 (identical to record 6)
  results:
    requests_total: 5357
    failures_total: 443
    error_rate: 0.083
    peak_rps_requested: 200
    peak_rps_sustained_1m: 41.1
    peak_rps_instant: 46
    p95_s_low_load: 0.0066
    p95_s_overload_max: 10.5
    vus_peak: 300  # pinned within ~2 min
    dropped_iterations: 4681
  bottleneck: >-
    CPU-bound at the 250m limit on N97 hardware (kubectl top under load:
    193m; CFS-throttled). Head-to-head vs record 6 (identical profile,
    limits and image; only the node differs): amleyg00/Zen kneed at
    ~160 rps with 2.2ms low-load p95; amley01/N97 knees at ~41-46 rps
    with 6.6ms low-load p95 - a ~3.5-4x per-core gap. This is the
    PRODUCTION-representative number: linkding-production runs on the
    N97s with the same limits. Still ~40x a single user's real load.
  followup: >-
    none for linkding. General lesson for capacity math: a millicore
    limit is worth 3.5-4x less on the N97 servers than on amleyg00 -
    factor node class into any future limit tuning.

- run: 2026-07-04-linkding-write-postgres-1
  testid: linkding-write-postgres
  scenario: linkding-write
  window_utc: ["2026-07-04T19:47:55Z", "2026-07-04T19:53:55Z"]
  status: completed
  target:
    app: linkding (postgres-backed, CNPG linkding-db instances=2)
    namespace: linkding-development
    endpoint: POST http://linkding.linkding-development.svc:3000/api/bookmarks/
    image: sissbruecker/linkding:1.45.0
    replicas: 1
    cpu_request: 125m
    cpu_limit: 250m
    memory_request: 768Mi
    memory_limit: 1Gi
  profile: ramping-arrival-rate 5->120 writes/s over 7m, preAllocatedVUs 100, maxVUs 300
  results:
    requests_total: 8120
    failures_total: 1371  # all status 0 = k6-side timeouts, no HTTP errors
    error_rate: 0.169
    peak_rps_requested: 120
    peak_rps_sustained_1m: 23.8
    p95_s_low_load: 0.030
    p95_s_overload_max: 35.9
    vus_peak: 300  # pinned
    dropped_iterations: 19029
  bottleneck: >-
    Write knee ~24/s and it is STILL linkding cpu (0.244 of 0.250 limit;
    each API write is a full Django request incl. token-auth query).
    Postgres loafed: primary 0.17 of 0.5 cores, standby idle - the
    database has ~3x headroom at the app's ceiling, so a sqlite-vs-
    postgres write A/B is unobservable at these limits; Django saturates
    first. Setup notes: linkding uses its OWN ApiToken model (DRF
    authtoken tokens get "Invalid token"); title+description supplied
    inline so no synchronous URL scraping; token lives in the
    linkding-api-token secret in the benchmarks namespace (out-of-git).
  followup: >-
    To ever see the DB in a write benchmark, raise linkding's cpu limit
    first. Record 9 is the CNPG failover drill on this same stack.

- run: 2026-07-04-linkding-write-failover-1
  testid: linkding-write-failover
  scenario: linkding-write (one-off variant - constant-arrival-rate 15/s for 6m)
  window_utc: ["2026-07-04T19:55:55Z", "2026-07-04T20:02:22Z"]
  status: completed
  target:
    app: linkding (postgres-backed, CNPG linkding-db instances=2)
    namespace: linkding-development
    endpoint: POST http://linkding.linkding-development.svc:3000/api/bookmarks/
    image: sissbruecker/linkding:1.45.0
    replicas: 1
    cpu_request: 125m
    cpu_limit: 250m
    memory_request: 768Mi
    memory_limit: 1Gi
  profile: constant-arrival-rate 15 writes/s for 6m; PRIMARY POD (linkding-db-1) DELETED at 19:58:05
  results:
    requests_total: 4388
    failures_total: 1859
    error_rate: 0.42
    write_outage_seconds: 200  # errors 19:58:12 -> ~20:01:30 at ~10-11 fail/s
    p95_s_max: 17.3
  bottleneck: >-
    HEADLINE FINDING: deleting the primary pod does NOT give seconds-level
    failover. The PVC survives a pod delete, so the operator restarts the
    SAME instance in place (waiting on the single-replica Longhorn volume
    to reattach) instead of promoting the standby - promotion to
    linkding-db-2 only completed ~3m20s after the kill (CNPG status:
    Failing over at +6s, new primary healthy at 20:01:24). Writes failed
    at ~10-11/s (2/3 of offered load) for the whole window; the linkding
    pod itself was liveness-restarted once during the outage. Full
    redundancy (old primary re-cloned as standby) restored automatically.
  followup: >-
    Drill variants to test the faster paths: (a) clean switchover via
    'kubectl cnpg promote' (planned maintenance path), (b) true node-level
    failure (kubelet gone, not pod delete) which skips the
    restart-in-place preference. Also consider whether
    .spec.failoverDelay / smart shutdown timeouts should be tuned if
    dev-grade failover time ever matters.

- run: 2026-07-04-linkding-knee-2x500m-1
  testid: linkding-knee-2x500m
  scenario: linkding-knee
  window_utc: ["2026-07-04T20:20:59Z", "2026-07-04T20:26:55Z"]
  status: completed
  target:
    app: linkding (postgres-backed, scale experiment step 1)
    namespace: linkding-development
    endpoint: http://linkding.linkding-development.svc:3000/login (via 301 -> /login/, see note)
    image: sissbruecker/linkding:1.45.0
    replicas: 2  # pinned amleyg00, PVC swapped for emptyDir (PR #126)
    cpu_request: 125m
    cpu_limit: 500m
    memory_request: 768Mi
    memory_limit: 1Gi
  profile: ramping-arrival-rate 10->400 iterations/s over 7m, maxVUs 400
  results:
    requests_total: 177598  # = 2x iterations, see note
    failures_total: 0
    error_rate: 0.0
    peak_iterations_per_s: 400
    peak_http_rps: 800
    p95_s_low_load: 0.0024
    p95_s_at_peak: 0.105
    vus_peak: 3
    dropped_iterations: 0
  bottleneck: >-
    None reached - full profile, zero failures, pods at 0.38 of their
    0.50 limits (unthrottled). Horizontal scaling on postgres works:
    ~525 renders/core vs ~320/core when throttled at 250m (record 6).
    p95 rising 2.4ms -> 105ms in the top stage hints the next ceiling
    (likely uwsgi workers) is near. CORRECTION (found post-run): the
    step-1 patch misindented the LD_DB_* env block under volumes[] where
    the API server silently dropped it, so this run actually served from
    a fresh sqlite on emptyDir per pod, NOT postgres - fixed in the
    step-2.5 PR. Render-path CPU numbers stand; the "horizontal scaling
    on postgres" claim is re-proven by record 11.
    METHODOLOGY NOTE discovered here:
    GET /login 301s to /login/ (django APPEND_SLASH) and k6 follows -
    every prior linkding-knee record counted redirect+render PAIRS, so
    record 6's "160 rps" = ~80 renders/s and record 7's "41-46" =
    ~20-23 renders/s. Ratios between records remain valid. Scenario now
    targets /login/ directly.
  followup: >-
    Step 2: cpu limit 1000m (2x1000m total) + ramp to 1200 targeting the
    1000 renders/s goal; watch for a worker-count ceiling before CPU.

- run: 2026-07-05-linkding-knee-2x1000m-1
  testid: linkding-knee-2x1000m
  scenario: linkding-knee
  window_utc: ["2026-07-05T02:48:03Z", "2026-07-05T02:55:34Z"]
  status: completed
  target:
    app: linkding (FIRST run actually on CNPG postgres - see record 10
      correction; unpooled, connection-per-request)
    namespace: linkding-development
    endpoint: http://linkding.linkding-development.svc:3000/login/
    image: sissbruecker/linkding:1.45.0
    replicas: 2  # pinned amleyg00, emptyDir scratch
    cpu_request: 125m
    cpu_limit: 1000m
    memory_request: 768Mi
    memory_limit: 1Gi
    database: linkding-db CNPG 2-instance, primary cpu limit 500m
  profile: ramping-arrival-rate 25->1200 iterations/s over 7m, maxVUs 600
  results:
    requests_total: 14147
    failures_total: 2472
    error_rate: 0.175
    peak_completed_rps: 40
    peak_successful_rps: 31
    p95_s_at_peak: 46.7
    median_s: 6.8
    max_s: 60.0  # k6 request timeout
    vus_peak: 600  # ceiling hit 44s into the run
    dropped_iterations: 217602
  bottleneck: >-
    Postgres connection setup, NOT app CPU. Django opens a fresh DB
    connection with a full SSL handshake per request; the CNPG primary
    sat pinned at its 500m limit the entire run (kubectl top) burning
    CPU on connection churn + abandoned-handshake storm ("could not
    accept SSL connection: unexpected eof") while the 2x1000m app pods
    idled at ~100m each. Renders 2ms (sqlite) -> 200ms+ (unpooled pg)
    even at moderate load; system collapsed at ~30-40 completed
    renders/s vs 400/s on sqlite (record 10) at HALF the app CPU.
    Confirms the sqlite-vs-postgres caveat in record 10's correction.
  followup: >-
    A/B with pgbouncer via CNPG Pooler CRD (session mode, pool 20) -
    same profile, testid linkding-knee-2x1000m-pooled. If pooling
    restores throughput, revisit the 1000 renders/s target; else also
    consider raising linkding-db's cpu limit.
