---
# GHCR pull credentials - the app repo (and its packages) stay private.
# The item needs a single field labeled `.dockerconfigjson` holding
# {"auths":{"ghcr.io":{"auth":"<base64 of simonyjung:PAT>"}}} where the PAT
# is a classic token with read:packages only.
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: dinglink-ghcr-pull-secret
type: kubernetes.io/dockerconfigjson
spec:
  itemPath: "vaults/Kubernetes/items/GHCR Pull - Dinglink"
