---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transmission
spec:
  replicas: 1
  # RWX config volume + RollingUpdate would run old and new daemons
  # against the same /config during every image bump - kill the old pod
  # before starting the new one
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: transmission
  template:
    metadata:
      labels:
        app: transmission
    spec:
      # Reschedule off a dead node after 60s instead of the default 300s
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
      containers:
        - name: transmission
          image: lscr.io/linuxserver/transmission:4.1.3
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Etc/UTC"
          ports:
            - containerPort: 9091
            - containerPort: 51413
            - containerPort: 51413
              protocol: UDP
          # TCP probes: the web UI sits behind basic auth, so httpGet
          # would always see 401
          readinessProbe:
            tcpSocket:
              port: 9091
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          # Conservative: verifying a large torrent can make the daemon
          # sluggish; require ~2 minutes of failures before a restart
          livenessProbe:
            tcpSocket:
              port: 9091
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 4
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
            - name: watch
              mountPath: /watch
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 1.5Gi
              cpu: "1.5"
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: transmission-pvc
        - name: downloads
          persistentVolumeClaim:
            claimName: nfs-downloads-pvc
        - name: watch
          persistentVolumeClaim:
            claimName: nfs-watch-pvc
