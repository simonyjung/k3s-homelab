---
# First CNPG consumer in the cluster. Replication happens in Postgres
# (2 instances), so the volumes use the single-replica Longhorn class.
# CNPG's initdb bootstrap creates the `app` database and publishes its
# credentials in the `shaadimubarak-db-app` secret (key `uri`).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: shaadimubarak-db
spec:
  instances: 2
  storage:
    size: 2Gi
    storageClass: longhorn-1replica
  monitoring:
    enablePodMonitor: true
