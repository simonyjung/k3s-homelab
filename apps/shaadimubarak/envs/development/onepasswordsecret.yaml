---
# Same 1Password items as production (secrets are namespaced, so dev needs
# its own copies), minus the cloudflared credentials - no tunnel in dev.
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: shaadimubarak-django-secret
spec:
  itemPath: "vaults/Kubernetes/items/Shaadimubarak Django"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: shaadimubarak-ghcr-pull-secret
type: kubernetes.io/dockerconfigjson
spec:
  itemPath: "vaults/Kubernetes/items/GHCR Pull - Shaadimubarak"
