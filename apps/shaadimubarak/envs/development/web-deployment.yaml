---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shaadimubarak-web
spec:
  template:
    spec:
      containers:
        - name: shaadimubarak-web
          env:
            - name: ORIGIN
              value: "https://shaadimubarak-dev.cluster.simonjung.io"
            # Dev traffic arrives through Traefik on the LAN, not the
            # Cloudflare tunnel, so the client IP is in the standard header.
            - name: ADDRESS_HEADER
              value: "x-forwarded-for"
