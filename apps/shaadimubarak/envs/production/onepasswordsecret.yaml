---
# Django SECRET_KEY; item field name must be DJANGO_SECRET_KEY.
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: shaadimubarak-django-secret
spec:
  itemPath: "vaults/Kubernetes/items/Shaadimubarak Django"
---
# Tunnel credentials.json for the `shaadimubarak` Cloudflare tunnel.
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: shaadimubarak-cloudflared-secret
spec:
  itemPath: "vaults/Kubernetes/items/Cloudflared - Shaadimubarak"
