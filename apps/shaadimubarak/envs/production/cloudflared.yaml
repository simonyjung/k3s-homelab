---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
spec:
  selector:
    matchLabels:
      app: cloudflared
  replicas: 2
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      automountServiceAccountToken: false
      # The image is distroless and ships USER 65532; stating it here lets
      # the kubelet enforce it
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      # Both replicas on one node would defeat the point - force them
      # onto different nodes
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: cloudflared
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2026.7.1
          args:
            - tunnel
            - --config
            - /etc/cloudflared/config/config.yaml
            - run
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              # /ready returns 200 iff cloudflared has an active edge connection.
              path: /ready
              port: 2000
            # was 1 - a single transient edge blip restarted the pod
            failureThreshold: 3
            initialDelaySeconds: 10
            periodSeconds: 10
          # Gate rollouts on an established edge connection - no Service
          # selects these pods, so liveness alone was the only health signal
          readinessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared/config
              readOnly: true
            - name: creds
              mountPath: /etc/cloudflared/creds
              readOnly: true
          resources:
            requests:
              memory: 64Mi
              cpu: 25m
            limits:
              memory: 128Mi
              cpu: 50m
      volumes:
        - name: creds
          secret:
            secretName: shaadimubarak-cloudflared-secret
        - name: config
          configMap:
            name: cloudflared
            items:
              - key: config.yaml
                path: config.yaml
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared
data:
  config.yaml: |
    tunnel: shaadimubarak

    credentials-file: /etc/cloudflared/creds/credentials.json

    # Serves the metrics server under /metrics and the readiness server under /ready
    metrics: 0.0.0.0:2000
    no-autoupdate: true

    ingress:
    # Apex only: SvelteKit's form-action origin check is pinned to ORIGIN,
    # so a www host would 403 on RSVP submits - use a Cloudflare redirect
    # rule (www -> apex) instead if www DNS is ever added.
    - hostname: roy-jung.com
      service: http://shaadimubarak-web:3000

    # Catch-all: anything that didn't match a hostname above gets a 404.
    - service: http_status:404
