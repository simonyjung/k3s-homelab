---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: cloudbeaver
  name: cloudbeaver
spec:
  replicas: 1
  # Workspace on a RWO volume - one writer only
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: cloudbeaver
  template:
    metadata:
      labels:
        app: cloudbeaver
    spec:
      automountServiceAccountToken: false
      containers:
        - name: cloudbeaver
          image: dbeaver/cloudbeaver:26.1.3
          # TLS terminates at traefik; the pod only ever sees http. With
          # forceHttps on (image default) every request - including API
          # POSTs like the connection test - gets 301'd and breaks.
          env:
            - name: CLOUDBEAVER_FORCE_HTTPS
              value: "false"
            # Image default hides the "New connection" button outside
            # the admin panel - single-admin instance, let the app view
            # create connections directly
            - name: CLOUDBEAVER_APP_SUPPORTS_CUSTOM_CONNECTIONS
              value: "true"
          ports:
            - name: http
              containerPort: 8978
              protocol: TCP
          # Java app - give it time to boot before gating traffic
          readinessProbe:
            httpGet:
              path: /
              port: 8978
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          volumeMounts:
            - name: workspace
              mountPath: /opt/cloudbeaver/workspace
          resources:
            requests:
              memory: 512Mi
              cpu: 100m
            limits:
              memory: 1Gi
              cpu: 500m
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: cloudbeaver-pvc
