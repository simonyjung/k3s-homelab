---
apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    app: homepage
  name: homepage
spec:
  # Single replica BY DESIGN: homepage keeps per-pod in-memory state, so
  # >1 replica makes background API calls disagree with the serving pod
  # and the UI flicker-re-renders (upstream: gethomepage discussion
  # #2305). Sticky sessions don't help here - traffic arrives via the
  # cloudflared tunnel (itself 2 replicas), not traefik. Node-failure
  # recovery comes from the Longhorn node-down policy + fast reschedule.
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: homepage
    spec:
      serviceAccountName: homepage
      automountServiceAccountToken: true
      containers:
        - image: ghcr.io/gethomepage/homepage:v1.13.2
          name: homepage
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: home.simonjung.io
          # Host header must match HOMEPAGE_ALLOWED_HOSTS or the app
          # answers 400
          readinessProbe:
            httpGet:
              path: /api/healthcheck
              port: 3000
              httpHeaders:
                - name: Host
                  value: home.simonjung.io
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - mountPath: /app/config/custom.js
              name: homepage-config
              subPath: custom.js
            - mountPath: /app/config/custom.css
              name: homepage-config
              subPath: custom.css
            - mountPath: /app/config/bookmarks.yaml
              name: homepage-config
              subPath: bookmarks.yaml
            - mountPath: /app/config/docker.yaml
              name: homepage-config
              subPath: docker.yaml
            - mountPath: /app/config/kubernetes.yaml
              name: homepage-config
              subPath: kubernetes.yaml
            - mountPath: /app/config/services.yaml
              name: homepage-config
              subPath: services.yaml
            - mountPath: /app/config/settings.yaml
              name: homepage-config
              subPath: settings.yaml
            - mountPath: /app/config/widgets.yaml
              name: homepage-config
              subPath: widgets.yaml
            - mountPath: /app/config/logs
              name: logs
          # Memory right-sized from observed ~112Mi. CPU limit raised
          # 100m -> 500m: the 2026-07-04 benchmark showed 100m throttles
          # SSR to ~30 rps with multi-second latencies (see
          # benchmarks/results.yaml, run 2026-07-04-homepage-ramp-1)
          resources:
            requests:
              memory: 256Mi
              cpu: 25m
            limits:
              memory: 768Mi
              cpu: 500m
      volumes:
        - name: homepage-config
          configMap:
            name: homepage
        - name: logs
          emptyDir: {}
