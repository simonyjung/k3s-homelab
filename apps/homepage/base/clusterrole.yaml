---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homepage
  labels:
    app: homepage
# Minimum for the widgets.yaml kubernetes widget (cluster + node
# CPU/memory). Service tiles are hand-written in services.yaml, so the
# ingress/pod/namespace discovery permissions homepage's docs suggest
# are not needed - the pod is internet-reachable, keep this tight.
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
      - list
  - apiGroups:
      - metrics.k8s.io
    resources:
      - nodes
    verbs:
      - get
      - list
