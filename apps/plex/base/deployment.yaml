---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
  labels:
    app: plex
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: plex
  template:
    metadata:
      labels:
        app: plex
    spec:
      # Use hostNetwork to resolve relay issues with Plex clients
      # Makes Plex listen on the node’s IP like a bare-metal install
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      # Pin Plex to the GPU node (AMD iGPU for hardware transcoding).
      # hostNetwork means the router's 32400 port forward must target this
      # node's IP (10.0.10.30).
      nodeSelector:
        kubernetes.io/hostname: amleyg00
      containers:
        - name: plex
          image: lscr.io/linuxserver/plex:1.43.2
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "America/New_York"
            - name: PLEX_CLAIM
              valueFrom:
                secretKeyRef:
                  name: plex-claim-token-secret
                  key: claim
          ports:
            - name: http
              containerPort: 32400
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: tv
              mountPath: /tv
            - name: movies
              mountPath: /movies
            - name: dev-dri
              mountPath: /dev/dri
          # Privileged for /dev/dri access (VAAPI hardware transcoding),
          # same approach the ollama deployment used on this node
          securityContext:
            privileged: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "3000m"
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: plex-config-pvc
        - name: tv
          persistentVolumeClaim:
            claimName: plex-tv-pvc
        - name: movies
          persistentVolumeClaim:
            claimName: plex-movies-pvc
        - name: dev-dri
          hostPath:
            path: /dev/dri
            type: Directory
