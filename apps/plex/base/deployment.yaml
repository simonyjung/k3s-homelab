---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
  labels:
    app: plex
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: plex
  template:
    metadata:
      labels:
        app: plex
    spec:
      # Use hostNetwork to resolve relay issues with Plex clients
      # Makes Plex listen on the node’s IP like a bare-metal install
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      # Pin Plex to the GPU node (AMD iGPU for hardware transcoding).
      # hostNetwork means the router's 32400 port forward must target this
      # node's IP (10.0.10.30).
      nodeSelector:
        kubernetes.io/hostname: amleyg00
      containers:
        - name: plex
          image: lscr.io/linuxserver/plex:1.43.2
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "America/New_York"
            # No hardware transcoding on this GPU until Plex updates their
            # driver bundle: their musl-linked transcoder only loads Plex's
            # own radeonsi build, which supports up to gfx1103 — Strix Halo
            # is gfx1151. System mesa cannot be substituted across the
            # musl/glibc wall. Re-test after PMS upgrades (plan.md).
            - name: PLEX_CLAIM
              valueFrom:
                secretKeyRef:
                  name: plex-claim-token-secret
                  key: claim
          ports:
            - name: http
              containerPort: 32400
              protocol: TCP
          # First boot after an image bump can be slow (db migrations,
          # library housekeeping) - give it up to 5 minutes
          startupProbe:
            httpGet:
              path: /identity
              port: 32400
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /identity
              port: 32400
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # Conservative on purpose: library scans can make Plex slow to
          # answer; require ~2 minutes of failures before a restart
          livenessProbe:
            httpGet:
              path: /identity
              port: 32400
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 4
          volumeMounts:
            - name: config
              mountPath: /config
            - name: tv
              mountPath: /tv
            - name: movies
              mountPath: /movies
            - name: dev-dri
              mountPath: /dev/dri
          # Privileged for /dev/dri access (VAAPI hardware transcoding),
          # same approach the ollama deployment used on this node
          securityContext:
            privileged: true
          resources:
            requests:
              memory: "1Gi"
              cpu: "1"
            limits:
              # 4Gi since the BIOS iGPU carve-out was reduced to minimum
              # (2026-07-03) and the OS sees ~29Gi. CPU cap is loose - HW
              # transcode barely uses CPU, but software-fallback bursts
              # shouldn't be throttled.
              memory: "4Gi"
              cpu: "8"
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: plex-config-pvc
        - name: tv
          persistentVolumeClaim:
            claimName: plex-tv-pvc
        - name: movies
          persistentVolumeClaim:
            claimName: plex-movies-pvc
        - name: dev-dri
          hostPath:
            path: /dev/dri
            type: Directory
