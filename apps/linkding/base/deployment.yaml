---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkding
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: linkding
  template:
    metadata:
      labels:
        app: linkding
    spec:
      automountServiceAccountToken: false
      # Reschedule off a dead node after 60s instead of the default 300s
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 60
      volumes:
        - name: linkding-volume
          persistentVolumeClaim:
            claimName: linkding-pvc
      containers:
        - name: linkding
          image: sissbruecker/linkding:1.45.0
          ports:
            - containerPort: 9090
          # Gate traffic until Django has migrated/started (Recreate
          # strategy restarts on every image bump)
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          # Readiness only removes a sick pod from the Service - a wedged
          # gunicorn is never restarted without this (~2 min tolerance)
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 4
          volumeMounts:
            - name: linkding-volume
              mountPath: /etc/linkding/data
          resources:
            requests:
              memory: 768Mi
              cpu: 125m
            limits:
              memory: 1Gi
              cpu: 250m
