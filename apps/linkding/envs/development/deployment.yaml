---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkding
spec:
  template:
    spec:
      containers:
        - name: linkding
          # Dev-only: point linkding at the CNPG cluster instead of
          # sqlite. Credentials come from the linkding-db-app secret the
          # operator generates - they never leave the cluster. The -rw
          # service in the host key always targets the current primary.
          env:
            - name: LD_DB_ENGINE
              value: postgres
            - name: LD_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: linkding-db-app
                  key: host
            - name: LD_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: linkding-db-app
                  key: port
            - name: LD_DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: linkding-db-app
                  key: dbname
            - name: LD_DB_USER
              valueFrom:
                secretKeyRef:
                  name: linkding-db-app
                  key: username
            - name: LD_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: linkding-db-app
                  key: password
