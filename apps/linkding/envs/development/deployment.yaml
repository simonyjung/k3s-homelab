---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkding
spec:
  # Back to 1 replica (2026-07-05): the 1000 rps experiment is closed
  # (results.yaml records 10-14; knee ~1249/s at 2x1000m) and scaling
  # the render tier for real needs a shared SECRET_KEY + per-pod huey
  # answer first - see plan.md follow-ups. Resources revert to base
  # (250m); the postgres + pooler + persistent-connections stack stays.
  replicas: 1
  template:
    spec:
      containers:
        - name: linkding
          # Dev-only: point linkding at the CNPG cluster instead of
          # sqlite. Credentials come from the linkding-db-app secret the
          # operator generates - they never leave the cluster. Host is
          # the pgbouncer Pooler service (NOT the -rw service): Django
          # opens a DB connection per request and the unpooled SSL
          # handshake storm was the record-11 knee.
          env:
            - name: LD_DB_ENGINE
              value: postgres
            - name: LD_DB_HOST
              value: linkding-db-pooler-rw
            - name: LD_DB_PORT
              value: "5432"
            - name: LD_DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: linkding-db-app
                  key: dbname
            - name: LD_DB_USER
              valueFrom:
                secretKeyRef:
                  name: linkding-db-app
                  key: username
            - name: LD_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: linkding-db-app
                  key: password
          # Settings shim (persistent DB connections) - overlays the
          # image's placeholder custom.py, see custom.py in this dir
          volumeMounts:
            - name: custom-settings
              mountPath: /etc/linkding/bookmarks/settings/custom.py
              subPath: custom.py
              readOnly: true
      volumes:
        # Dev keeps emptyDir over the base PVC: bookmarks live in
        # postgres and dev has no assets/favicons worth persisting
        - name: linkding-volume
          persistentVolumeClaim: null
          emptyDir: {}
        - name: custom-settings
          configMap:
            name: linkding-custom-settings
