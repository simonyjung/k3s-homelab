---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkding
spec:
  # Horizontal scaling is possible in dev BECAUSE the backend is postgres
  # (production stays sqlite = replicas 1 forever). Scale-up experiment
  # for the 1000 rps target - see benchmarks/results.yaml records 6/10+.
  replicas: 2
  template:
    spec:
      # Pin to the Zen node: a millicore here is worth ~4x an N97
      # millicore (record 7), so floating pods would make benchmark
      # results placement-dependent noise
      nodeSelector:
        gpu: amd
      containers:
        - name: linkding
          # Doubled from base 250m for the scale-up experiment
          resources:
            limits:
              cpu: 500m
      volumes:
        # The base RWO PVC cannot be shared by 2 replicas; dev only keeps
        # favicons/assets here (bookmarks live in postgres) - per-pod
        # scratch is fine
        - name: linkding-volume
          persistentVolumeClaim: null
          emptyDir: {}
          # Dev-only: point linkding at the CNPG cluster instead of
          # sqlite. Credentials come from the linkding-db-app secret the
          # operator generates - they never leave the cluster. The -rw
          # service in the host key always targets the current primary.
          env:
            - name: LD_DB_ENGINE
              value: postgres
            - name: LD_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: linkding-db-app
                  key: host
            - name: LD_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: linkding-db-app
                  key: port
            - name: LD_DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: linkding-db-app
                  key: dbname
            - name: LD_DB_USER
              valueFrom:
                secretKeyRef:
                  name: linkding-db-app
                  key: username
            - name: LD_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: linkding-db-app
                  key: password
