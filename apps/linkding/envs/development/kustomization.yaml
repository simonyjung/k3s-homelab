---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - postgres-cluster.yaml
  - postgres-pooler.yaml

patches:
  - path: persistentvolumeclaim.yaml
  - path: service.yaml
  - path: deployment.yaml

# Django settings shim mounted over linkding's custom.py hook - see
# comments in custom.py. The name hash forces a rollout on change
# (subPath mounts never hot-reload).
configMapGenerator:
  - name: linkding-custom-settings
    files:
      - custom.py
