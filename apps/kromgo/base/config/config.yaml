---
# kromgo badge definitions - each id becomes a public endpoint at
# /badges/<id> (append ?format=shields for shields.io endpoint JSON).
# Only these queries are reachable; Prometheus itself is never exposed.
badges:
  - id: nodes
    title: nodes ready
    query: sum(kube_node_status_condition{condition="Ready",status="true"})
    valueExpr: string(int(result))
    colorExpr: 'result >= 4 ? "green" : "red"'

  - id: pods
    title: pods running
    query: sum(kube_pod_status_phase{phase="Running"})
    valueExpr: string(int(result))
    colorExpr: '"blue"'

  - id: cpu
    title: cluster cpu
    query: round(cluster:node_cpu:ratio_rate5m * 100, 0.1)
    valueExpr: string(result) + "%"
    colorExpr: 'result < 50.0 ? "green" : result < 80.0 ? "orange" : "red"'

  - id: memory
    title: cluster memory
    query: >-
      round((1 - sum(node_memory_MemAvailable_bytes)
      / sum(node_memory_MemTotal_bytes)) * 100, 0.1)
    valueExpr: string(result) + "%"
    colorExpr: 'result < 70.0 ? "green" : result < 85.0 ? "orange" : "red"'

  - id: alerts
    title: alerts firing
    query: >-
      count(ALERTS{alertstate="firing",alertname!="Watchdog"})
      or on() vector(0)
    valueExpr: string(int(result))
    colorExpr: 'result == 0.0 ? "green" : "red"'
