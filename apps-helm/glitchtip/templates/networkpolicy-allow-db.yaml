---
# Cross-namespace paths into the CNPG instances: the operator manages
# them via the instance-manager API (8000), prometheus scrapes the
# postgres exporter (9187, PodMonitor), and cloudbeaver — the LAN-only
# DB admin UI — gets postgres (5432) as a deliberate standing allowance
# (plan 12.4; revisit if cloudbeaver is ever exposed off-LAN). Postgres
# is otherwise same-namespace only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-db-operator-and-metrics
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: glitchtip-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cloudnative-pg
          podSelector:
            matchLabels:
              app.kubernetes.io/name: cloudnative-pg
      ports:
        - protocol: TCP
          port: 8000
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 9187
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cloudbeaver-production
          podSelector:
            matchLabels:
              app: cloudbeaver
      ports:
        - protocol: TCP
          port: 5432
