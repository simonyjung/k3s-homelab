---
# Everything in this namespace is glitchtip: web -> postgres/valkey, the
# migrate Job -> postgres/valkey, and CNPG streaming replication between
# the two db instances. A namespace-wide allow (rather than label
# selectors) deliberately covers the migrate Job pods, which carry only
# batch/job-name labels.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
