---
# kube-vip in ARP (L2) mode, control-plane VIP only.
#
# Elects one leader among the server nodes to answer ARP for the
# API VIP 10.0.10.250:6443; on leader loss another server takes over
# (same L2 pattern MetalLB uses for ingress, see docs/load-balancing.md).
# Service LoadBalancer mode is explicitly OFF (svc_enable=false) —
# MetalLB owns LoadBalancer services.
#
# The VIP must be covered by the API serving cert: every server's
# /etc/rancher/k3s/config.yaml carries `tls-san: [10.0.10.250]`
# (host-level config, outside git — see docs/setup.md).
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-vip
  namespace: kube-vip
  labels:
    app.kubernetes.io/name: kube-vip
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kube-vip
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kube-vip
    spec:
      serviceAccountName: kube-vip
      hostNetwork: true
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
          operator: Exists
        - effect: NoExecute
          key: node-role.kubernetes.io/etcd
          operator: Exists
      containers:
        - name: kube-vip
          image: ghcr.io/kube-vip/kube-vip:v1.2.1
          imagePullPolicy: IfNotPresent
          args: [manager]
          env:
            - name: address
              value: "10.0.10.250"
            - name: port
              value: "6443"
            - name: vip_arp
              value: "true"
            - name: vip_cidr
              value: "32"
            # vip_interface intentionally unset: kube-vip binds the VIP
            # to each node's default-route interface automatically.
            - name: cp_enable
              value: "true"
            - name: cp_namespace
              value: kube-vip
            - name: svc_enable
              value: "false"
            - name: vip_leaderelection
              value: "true"
            - name: vip_leasename
              value: kube-vip-cp-lock
            - name: vip_leaseduration
              value: "5"
            - name: vip_renewdeadline
              value: "3"
            - name: vip_retryperiod
              value: "1"
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW"]
